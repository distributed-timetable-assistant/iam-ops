name: Deploy Stage Overlays
on:
  push:
    paths:
      - "gatekeeper/**"
      - "hydra-db/**"
      - "hydra/**"
      - "kratos/**"
      - "kratos-auth/**"
      - "mailslurper/**"
      - "oauth2-proxy/**"
      - "whoami-svc1/**"
      - "whoami-svc2/**"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.collect.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed apps
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          base='${{ github.event.before }}'
          head='${{ github.sha }}'

          if [[ "$base" == '0000000000000000000000000000000000000000' ]]; then
            base="$(git rev-list --max-parents=0 "$head" | tail -n 1)"
          fi

          apps=()
          while IFS= read -r file; do
            app="${file%%/*}"
            case "$app" in
              gatekeeper|hydra-db|hydra|kratos|kratos-auth|mailslurper|oauth2-proxy|whoami-svc1|whoami-svc2)
                apps+=("$app")
                ;;
            esac
          done < <(git diff --name-only "$base" "$head")

          if (( ${#apps[@]} == 0 )); then
            echo 'apps=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t unique_apps < <(printf '%s\n' "${apps[@]}" | sort -u)
          json="$(printf '%s\n' "${unique_apps[@]}" | jq -R -s -c 'split("\n")[:-1]')"
          echo "apps=$json" >> "$GITHUB_OUTPUT"

  stage-deploy:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.apps != '[]' }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.detect-changes.outputs.apps) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-hub/kubectl@master
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONF }}
        with:
          args: apply -k ${{ matrix.app }}/overlays/stage

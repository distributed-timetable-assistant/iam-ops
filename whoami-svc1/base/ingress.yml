apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: whoami-svc1
  annotations:
    nginx.ingress.kubernetes.io/auth-url: http://oauth2-proxy-svc1:4180/oauth2/svc1/auth
    nginx.ingress.kubernetes.io/auth-signin: https://svc1.login.outi.ir/oauth2/svc1/start?rd=$scheme://$host$request_uri
    nginx.ingress.kubernetes.io/auth-response-headers: X-Auth-Request-User,X-Auth-Request-Email,Authorization
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - svc1.login.outi.ir
      secretName: svc1-tls
  rules:
    - host: svc1.login.outi.ir
      http:
        paths:
          - path: /svc1
            pathType: Prefix
            backend:
              service:
                name: whoami-svc1
                port:
                  name: http

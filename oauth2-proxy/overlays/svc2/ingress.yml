apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth2-proxy
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - login.outi.ir
      secretName: gatekeeper-tls
  rules:
    - host: login.outi.ir
      http:
        paths:
          - path: /oauth2/svc2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  name: http

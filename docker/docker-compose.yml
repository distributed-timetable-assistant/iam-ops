version: '3.7'
services:
  hydra-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=hydra
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=hydra
    networks:
      - intranet
    restart: unless-stopped

  hydra-migrate:
    image: oryd/hydra:v26.2.0
    depends_on:
      - hydra-db
    environment:
      - DSN=postgres://hydra:secret@hydra-db:5432/hydra?sslmode=disable
    volumes:
      - type: bind
        source: ./config
        target: /etc/config/hydra
        read_only: true
    command: migrate -c /etc/config/hydra/hydra.yml sql -e --yes
    networks:
      - intranet
    restart: on-failure

  hydra:
    image: oryd/hydra:v26.2.0
    depends_on:
      - hydra-migrate
    ports:
      - "4444:4444" # public
      - "4445:4445" # admin
    environment:
      - DSN=postgres://hydra:secret@hydra-db:5432/hydra?sslmode=disable
    command: serve -c /etc/config/hydra/hydra.yml all --dev
    volumes:
      - type: bind
        source: ./config
        target: /etc/config/hydra
        read_only: true
    networks:
      - intranet
    restart: unless-stopped

  kratos-migrate:
    image: oryd/kratos:v26.2.0
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - DSN=sqlite:///var/lib/sqlite/users.db?_fk=true&_journal=WAL&mode=rwc
    volumes:
      - type: bind
        source: ..
        target: /var/lib/sqlite
        read_only: false
      - type: bind
        source: ./config
        target: /etc/config/kratos
    command: -c /etc/config/kratos/kratos.yml migrate sql -e --yes up
    restart: on-failure
    networks:
      - intranet
  kratos-selfservice-ui-node:
    image: oryd/kratos-selfservice-ui-node:v26.2.0
    environment:
      - KRATOS_PUBLIC_URL=http://kratos:4433/
      - KRATOS_BROWSER_URL=http://localhost:4433/
      - COOKIE_SECRET=changeme
      - CSRF_COOKIE_NAME=ory_csrf_ui
      - CSRF_COOKIE_SECRET=changeme
    networks:
      - intranet
    restart: on-failure
  kratos:
    depends_on:
      - kratos-migrate
    image: oryd/kratos:v26.2.0
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - '4433:4433' # public
      - '4434:4434' # admin
    restart: unless-stopped
    environment:
      - DSN=sqlite:///var/lib/sqlite/users.db?_fk=true&_journal=WAL
      - LOG_LEVEL=trace
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    volumes:
      - type: bind
        source: ..
        target: /var/lib/sqlite
        read_only: false
      - type: bind
        source: ./config
        target: /etc/config/kratos
    networks:
      - intranet
  mailslurper:
    image: oryd/mailslurper:latest-smtps
    ports:
      - '4436:4436'
      - '4437:4437'
    networks:
      - intranet
  oathkeeper:
    image: oryd/oathkeeper:v26.2.0
    ports:
      - '4455:4455' # proxy
      - '4456:4456' # api
    command: serve -c /etc/config/oathkeeper/oathkeeper.yml
    volumes:
      - type: bind
        source: ./config
        target: /etc/config/oathkeeper
        read_only: true
    networks:
      - intranet
    restart: unless-stopped
    depends_on:
      - kratos
  whoami-svc1:
    image: traefik/whoami:v1.10
    networks:
      - intranet
    restart: unless-stopped
  whoami-svc2:
    image: traefik/whoami:v1.10
    networks:
      - intranet
    restart: unless-stopped
networks:
  intranet:
volumes: {}

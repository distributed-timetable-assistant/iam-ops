log:
  level: debug
  format: text

serve:
  public:
    host: 0.0.0.0
    port: 4444
  admin:
    host: 0.0.0.0
    port: 4445
  cookies:
    secure: false
    same_site_mode: Lax

urls:
  self:
    issuer: http://127.0.0.1:4444
  # Browser-facing URLs: these must be reachable from your host browser.
  login: http://127.0.0.1:3000/hydra/login
  consent: http://127.0.0.1:3000/hydra/consent
  logout: http://127.0.0.1:3000/hydra/logout

secrets:
  system:
    - PLEASE-CHANGE-ME-HYDRA-SYSTEM-SECRET

oidc:
  subject_identifiers:
    supported_types:
      - public
    pairwise:
      salt: PLEASE-CHANGE-ME-HYDRA-PAIRWISE-SALT
